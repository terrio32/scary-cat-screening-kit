name: Test Reporter

on:
  workflow_call:
    inputs:
      pull_request_number:
        description: 'Pull Request number'
        required: true
        type: number

permissions:
  checks: write          # JUnitレポートをChecksとして表示するために必要
  actions: read          # アーティファクトをダウンロードするために必要
  pull-requests: write   # PRにコメントするために必要

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p ./ci-outputs/test-results

      - name: Download Unit Test results artifact
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results-${{ github.run_id }}
          path: ./ci-outputs/test-results/unit

      - name: Publish Test Report as Check
        uses: mikepenz/action-junit-report@v4
        if: ${{ hashFiles('./ci-outputs/test-results/unit/junit.xml') != '' }}
        with:
          report_paths: './ci-outputs/test-results/unit/junit.xml'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_failure: false
          require_tests: false
          check_name: 'テスト結果'

      - name: Create or Update PR Comment
        if: ${{ hashFiles('./ci-outputs/test-results/**/*.xml') != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ inputs.pull_request_number }};
            if (!prNumber) {
              console.error('プルリクエスト番号を取得できませんでした。');
              return;
            }

            const { owner, repo } = context.repo;

            const commentMarker = '<!-- test-report -->';
            let commentBody = `${commentMarker}\n\n## テスト結果サマリー\n\n`;
            const fs = require('fs');

            // Test Results Summary
            const unitTestFile = './ci-outputs/test-results/unit/junit.xml';
            if (fs.existsSync(unitTestFile)) {
               commentBody += `✅ テスト結果: Checksタブで確認できます。\n`;
            } else {
               commentBody += `ℹ️ テスト結果: JUnitレポートが見つかりませんでした。\n`;
            }

            // 既存コメントの検索・更新 or 新規作成
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existingComment = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes(commentMarker));

            if (existingComment) {
              console.log(`PR #${prNumber}のコメント${existingComment.id}を更新します`);
              await github.rest.issues.updateComment({ owner, repo, comment_id: existingComment.id, body: commentBody });
            } else {
              console.log(`PR #${prNumber}に新しいコメントを作成します`);
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: commentBody });
            }